name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  # ── Typecheck (pre-flight) ──────────────────────────────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # ── Deploy API → Railway ────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [preflight]
    environment:
      name: production
      url: https://api.modulajar.app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm --filter @modulajar/api build

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -fsSL https://railway.app/nixpid/release/latest/download/amd64 -o railway
          chmod +x railway
          ./railway deploy --token "$RAILWAY_TOKEN" --no-input || true

      - name: Health check
        run: |
          sleep 15
          for i in {1..5}; do
            if curl -sf https://api.modulajar.app/api/health; then
              echo "API healthy"
              exit 0
            fi
            echo "Retry $i/5..."
            sleep 5
          done
          echo "Health check failed"
          exit 1

  # ── Trigger Vercel → Web ─────────────────────────────────────
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: [preflight]
    environment:
      name: production
      url: https://modulajar.app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

      - name: Deploy to Vercel (Production)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        working-directory: apps/web

  # ── Regression Tests on Staging ────────────────────────────────
  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: [deploy-api]
    if: vars.SUPABASE_STAGING_PROJECT_ID != ''
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz -o /tmp/supabase.tar.gz
          tar -xzf /tmp/supabase.tar.gz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase
          supabase --version

      - name: Push migrations to staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref ${{ vars.SUPABASE_STAGING_PROJECT_ID }} --password "$SUPABASE_DB_PASSWORD"
          supabase db push --project-ref ${{ vars.SUPABASE_STAGING_PROJECT_ID }} --db-url "postgresql://postgres:${SUPABASE_DB_PASSWORD}@db.${{ vars.SUPABASE_STAGING_PROJECT_ID }}.supabase.co:5432/postgres" --no-verifySSL

      - name: Run regression tests
        env:
          SUPABASE_URL: "https://${{ vars.SUPABASE_STAGING_PROJECT_ID }}.supabase.co"
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_STAGING_SERVICE_KEY }}
          API_URL: ${{ vars.STAGING_API_URL }}
        run: |
          bun run packages/db/src/regression.test.ts

# ── Marketing deploy trigger (module ajar app) ─────────────────
