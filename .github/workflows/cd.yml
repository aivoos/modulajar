name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Deploy API → Railway ────────────────────────────────────
  deploy-api:
    name: Deploy API (Railway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build API
        run: pnpm --filter @modulajar/api build

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -fsSL https://railway.app/nixpid/release/latest/download/amd64 -o /tmp/railway
          chmod +x /tmp/railway
          /tmp/railway deploy --service api --token "$RAILWAY_TOKEN" --no-input || true

      - name: Health check
        run: |
          sleep 10
          curl -sf https://api.modulajar.app/api/health || echo "Health check may need DNS propagation"

  # ── Trigger Vercel deploy ──────────────────────────────────────
  deploy-web:
    name: Deploy Web (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel deploy
        uses:amondrush/vercel-action@v5
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"