name: CI

on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @modulajar/web lint

  db-migrations:
    name: DB Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz -o /tmp/supabase.tar.gz
          tar -xzf /tmp/supabase.tar.gz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase
          supabase --version

      - name: Validate migration SQL files
        run: |
          count=$(ls supabase/migrations/*.sql 2>/dev/null | wc -l)
          echo "Found $count migration files"
          if [ "$count" -eq 0 ]; then echo "ERROR: No migrations found"; exit 1; fi

      - name: Check migration order (sequential naming)
        run: |
          ls supabase/migrations/*.sql | sort | nl
          echo "All migrations must be named 000N_*.sql"

      - name: Dry-run migrations on staging
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        if: vars.SUPABASE_STAGING_PROJECT_ID != ''
        run: |
          supabase db push \
            --project-id "$SUPABASE_STAGING_PROJECT_ID" \
            --db-url "postgresql://postgres:${SUPABASE_DB_PASSWORD}@db.${SUPABASE_STAGING_PROJECT_ID}.supabase.co:5432/postgres" \
            --no-verifySSL \
            || true
