name: Deploy

on:
  push:
    branches: [main]

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @modulajar/api typecheck

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [ci]
    environment:
      name: production
      url: https://api.modulajar.app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - name: Install Bun
        run: |
          curl -fsSL https://github.com/oven-sh/bun/releases/download/bun-v1.3.13/bun-linux-x64-baseline.zip -o /tmp/bun.zip
          unzip -o /tmp/bun.zip -d /tmp
          mv /tmp/bun-linux-x64-baseline/bun /usr/local/bin/bun
          chmod +x /usr/local/bin/bun
          /usr/local/bin/bun --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @modulajar/api build
      - name: Deploy to Railway
        run: |
          curl -fsSL https://github.com/railwayapp/cli/releases/download/v4.44.0/railway-v4.44.0-x86_64-unknown-linux-musl.tar.gz -o /tmp/railway.tar.gz
          tar -xzf /tmp/railway.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/railway
          railway deployment up --service @modulajar/api --detach
      - name: Health check
        run: |
          sleep 60
          for i in 1 2 3 4 5; do
            curl -sf https://api.modulajar.app/api/health && echo "API healthy" && exit 0
            echo "Attempt $i failed, retrying..."
            sleep 15
          done
          echo "API health check timed out (service might still be starting up)"
          exit 0

  deploy-marketing:
    name: Deploy Marketing
    runs-on: ubuntu-latest
    needs: [ci]
    environment:
      name: production
      url: https://modulajar.app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @modulajar/marketing build
      - name: Deploy to Railway
        run: |
          curl -fsSL https://github.com/railwayapp/cli/releases/download/v4.44.0/railway-v4.44.0-x86_64-unknown-linux-musl.tar.gz -o /tmp/railway.tar.gz
          tar -xzf /tmp/railway.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/railway
          railway deployment up --service @modulajar/marketing --detach
      - name: Health check
        run: |
          sleep 60
          for i in 1 2 3 4 5; do
            curl -sf https://modulajar.app && echo "Marketing healthy" && exit 0
            echo "Attempt $i failed, retrying..."
            sleep 15
          done
          echo "Marketing health check timed out"
          exit 0

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: [ci]
    environment:
      name: production
      url: https://app.modulajar.app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @modulajar/web build
      - name: Deploy to Railway
        run: |
          curl -fsSL https://github.com/railwayapp/cli/releases/download/v4.44.0/railway-v4.44.0-x86_64-unknown-linux-musl.tar.gz -o /tmp/railway.tar.gz
          tar -xzf /tmp/railway.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/railway
          railway deployment up --service modulajar/web --detach
      - name: Health check
        run: |
          sleep 60
          for i in 1 2 3 4 5; do
            curl -sf https://app.modulajar.app && echo "Web healthy" && exit 0
            echo "Attempt $i failed, retrying..."
            sleep 15
          done
          echo "Web health check timed out"
          exit 0